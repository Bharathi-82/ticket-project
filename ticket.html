<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Ticket Booking System</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111827;
      color: #f9fafb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .card {
      background: #1f2937;
      padding: 24px;
      border-radius: 12px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }

    h1 {
      margin-top: 0;
      text-align: center;
      color: #fbbf24;
    }

    label {
      display: block;
      margin-top: 12px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border-radius: 8px;
      border: none;
    }

    button {
      margin-top: 16px;
      width: 100%;
      padding: 10px;
      background: #ef4444;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    .result {
      margin-top: 16px;
      padding: 12px;
      background: #374151;
      border-radius: 8px;
      line-height: 1.5;
    }

    .note {
      font-size: 14px;
      margin-top: 10px;
      color: #d1d5db;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Movie Ticket Booking</h1>
    <p class="note">This example uses variables and conditions to calculate the ticket price.</p>

    <label for="age">Enter your age:</label>
    <input type="number" id="age" placeholder="Example: 25" />

    <label for="tickets">Number of tickets:</label>
    <input type="number" id="tickets" placeholder="Example: 3" />

    <button onclick="calculateTicketPrice()">Calculate Price</button>

    <div class="result" id="result">
      Your total will appear here.
    </div>
  </div>

  <script>
    function calculateTicketPrice() {
      // Variables
      let age = parseInt(document.getElementById("age").value);
      let numberOfTickets = parseInt(document.getElementById("tickets").value);
      let basePrice = 150;
      let totalPrice = 0;

      // Conditions
      if (age < 18) {
        totalPrice = numberOfTickets * 100;
      } else if (age >= 60) {
        totalPrice = numberOfTickets * 120;
      } else {
        totalPrice = numberOfTickets * basePrice;
      }

      if (numberOfTickets >= 5) {
        totalPrice = totalPrice - (totalPrice * 0.10);
      }

      document.getElementById("result").innerHTML =
        "Age: " + age + "<br>" +
        "Tickets: " + numberOfTickets + "<br>" +
        "Total Price: ₹" + totalPrice;
    }
  </script>
</body>
</html>
